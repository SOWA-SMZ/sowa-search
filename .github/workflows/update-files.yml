name: Update SharePoint Files JSON

on:
  schedule:
    - cron: '0 20 * * *'  # 毎日日本時間5時（UTC20時）に実行
  workflow_dispatch:       # 手動実行も可能

jobs:
  update-files:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch SharePoint files and save to files.json
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          python3 << 'EOF'
          import requests, json, os

          client_id     = os.environ['AZURE_CLIENT_ID']
          client_secret = os.environ['AZURE_CLIENT_SECRET']
          tenant_id     = os.environ['AZURE_TENANT_ID']

          # アクセストークン取得
          r = requests.post(
              f"https://login.microsoftonline.com/{tenant_id}/oauth2/v2.0/token",
              data={
                  "client_id": client_id,
                  "client_secret": client_secret,
                  "scope": "https://graph.microsoft.com/.default",
                  "grant_type": "client_credentials"
              }
          )
          token = r.json()["access_token"]
          headers = {"Authorization": f"Bearer {token}"}

          # サイトID取得
          r = requests.get(
              "https://graph.microsoft.com/v1.0/sites/sowa.sharepoint.com:/sites/SOWANAS",
              headers=headers
          )
          site_id = r.json()["id"]

          # ドライブID取得
          r = requests.get(
              f"https://graph.microsoft.com/v1.0/sites/{site_id}/drives",
              headers=headers
          )
          drives = r.json()["value"]
          drive = next((d for d in drives if d["name"] == "Documents"), drives[0])
          drive_id = drive["id"]

          # ファイル一覧を再帰取得
          all_files = []

          def fetch_recursive(folder_path):
              url = (
                  f"https://graph.microsoft.com/v1.0/drives/{drive_id}/root:/{folder_path}:/children"
                  f"?$top=999&$select=name,webUrl,lastModifiedDateTime,folder,file"
              )
              while url:
                  r = requests.get(url, headers=headers)
                  data = r.json()
                  for item in data.get("value", []):
                      if "file" in item and item["name"].lower().endswith(".pdf"):
                          all_files.append({
                              "name": item["name"],
                              "url": item["webUrl"],
                              "modified": item.get("lastModifiedDateTime", "")
                          })
                      elif "folder" in item:
                          fetch_recursive(f"{folder_path}/{item['name']}")
                  url = data.get("@odata.nextLink")

          fetch_recursive("sowanas/生産部/01_縫製仕様書")

          with open("files.json", "w", encoding="utf-8") as f:
              json.dump(all_files, f, ensure_ascii=False)

          print(f"完了: {len(all_files)}件のPDFを取得しました")
          EOF

      - name: Commit and push files.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add files.json
          git diff --cached --quiet || git commit -m "Update files.json [skip ci]"
          git push
